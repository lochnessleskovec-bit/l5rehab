<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="L5 Rehab">
<link rel="manifest" href="manifest.json">
<title>L5 Rehabilitace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1923;--bg2:#162030;--bg3:#1d2d40;--accent:#4fc3f7;--accent2:#81c784;--warn:#ffb74d;--text:#e8f4fd;--muted:#7a9ab5;--border:rgba(79,195,247,0.15);--orange:#ffb74d;--orangeD:#e65100}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
body{overflow-y:auto;overflow-x:hidden}
.topbar{display:flex;align-items:center;justify-content:center;padding:10px 18px 0;position:sticky;top:0;z-index:10;background:var(--bg)}
.main-tabs{display:flex;gap:0;background:var(--bg2);border-radius:12px;padding:3px;border:1px solid var(--border)}
.main-tab{padding:7px 22px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.main-tab.on{background:var(--accent);color:#0f1923}
.subnav{display:none;gap:4px;padding:10px 16px 6px;overflow-x:auto;scrollbar-width:none}
.subnav::-webkit-scrollbar{display:none}
.subnav.on{display:flex}
.nav-tab{flex:none;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.nav-tab.on{background:var(--accent);color:#0f1923;border-color:var(--accent);font-weight:700}
.nav-tab.fit-on{background:var(--orange);color:#0f1923;border-color:var(--orange);font-weight:700}
.screen{display:none;padding:16px 16px 80px}
.screen.on{display:block}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-size:16px;font-weight:700}
.cal-nav{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-day-name{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);padding:4px 0}
.cal-day{text-align:center;padding:5px 2px;border-radius:8px;font-size:12px;border:1px solid transparent;min-height:36px;display:flex;flex-direction:column;align-items:center;gap:2px}
.cal-day.empty{opacity:0}
.cal-day.today{border-color:var(--accent);color:var(--accent)}
.cal-day.done{background:rgba(129,199,132,.15);border-color:rgba(129,199,132,.3)}
.cal-day.done .cal-dot{background:var(--accent2)}
.cal-day.planned .cal-dot{background:var(--accent)}
.cal-dot{width:6px;height:6px;border-radius:50%}
.today-card{background:var(--bg2);border:1px solid rgba(79,195,247,.35);border-radius:14px;padding:16px;margin-bottom:16px}
.today-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:10px;font-family:'DM Mono',monospace;letter-spacing:.06em}
.today-exs{display:flex;flex-direction:column;gap:6px}
.today-ex{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:9px;font-size:13px;cursor:pointer}
.tex-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#0f1923;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tex-done .tex-num{background:var(--accent2)}
.tex-name{flex:1;font-weight:500}
.tex-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.tex-arrow{color:var(--muted)}
.tex-done .tex-arrow{color:var(--accent2)}
.start-btn{width:100%;padding:13px;background:var(--accent);color:#0f1923;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-top:12px}
.start-btn.done-btn{background:var(--accent2)}
.sec-title{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em;margin-bottom:10px}
.phase-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.phase-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.phase-card.active{border-color:rgba(79,195,247,.35)}
.phase-lbl{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.phase-card.active .phase-lbl{color:var(--accent)}
.phase-ttl{font-size:14px;font-weight:700;margin-bottom:4px}
.phase-dsc{font-size:12px;color:var(--muted);margin-bottom:8px}
.phase-exs{display:flex;flex-wrap:wrap;gap:5px}
.phase-ex{font-size:11px;padding:2px 9px;border-radius:8px;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace}
.ex-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.ex-tabs::-webkit-scrollbar{display:none}
.ex-tab{flex:none;padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'Syne',sans-serif;transition:all .2s}
.ex-tab.on{background:var(--accent);color:#0f1923;border-color:var(--accent);font-weight:700}
.ex-tab.dtab{border-color:rgba(129,199,132,.4);color:var(--accent2)}
.anim-wrap{background:#0a1520;border-radius:14px;margin-bottom:12px;display:flex;flex-direction:column;align-items:center;padding:12px 12px 8px}
.phase-pill{background:rgba(79,195,247,.15);color:var(--accent);font-size:11px;font-weight:500;padding:4px 14px;border-radius:20px;margin-bottom:10px;letter-spacing:.02em;font-family:'DM Mono',monospace}
canvas{border-radius:10px;max-width:100%;width:100%}
.prog-wrap{width:100%;height:3px;background:var(--bg3);border-radius:2px;margin-top:10px;overflow:hidden}
.prog-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .05s linear}
.ex-info{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.ex-name{font-size:15px;font-weight:700;margin-bottom:3px}
.ex-desc{font-size:12px;color:var(--muted);margin-bottom:8px}
.meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.bdg{font-size:11px;padding:3px 10px;border-radius:8px;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace}
.voice-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:9px}
.vdot{width:7px;height:7px;border-radius:50%;background:var(--accent2);opacity:0}
.vdot.on{opacity:1;animation:p 1.2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}
.vlabel{flex:1;font-size:12px;color:var(--muted)}
.vbtn{padding:5px 11px;font-size:11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif}
.vbtn.on{background:rgba(129,199,132,.1);border-color:var(--accent2);color:var(--accent2)}
.steps-row{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:10px}
.steps-row::-webkit-scrollbar{display:none}
.sc{flex:none;display:flex;align-items:flex-start;gap:6px;padding:8px 11px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);max-width:200px;transition:all .2s}
.sc.on{border-color:var(--accent);background:rgba(79,195,247,.08)}
.sn{min-width:17px;height:17px;border-radius:50%;background:var(--bg);font-size:10px;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;color:var(--muted);border:1px solid var(--border);flex-shrink:0}
.sc.on .sn{background:var(--accent);color:#0f1923;border-color:var(--accent)}
.stxt{font-size:12px;line-height:1.45;color:var(--muted)}
.sc.on .stxt{color:var(--text)}
.ctrl-row{display:flex;gap:8px;margin-bottom:8px}
.btn-play{flex:1;padding:12px;background:var(--accent);color:#0f1923;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif}
.btn-reset{padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;font-size:14px;color:var(--muted);cursor:pointer}
.btn-done{width:100%;padding:11px;background:rgba(129,199,132,.12);color:var(--accent2);border:1px solid rgba(129,199,132,.3);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-bottom:6px}
.btn-next{width:100%;padding:11px;background:var(--accent);color:#0f1923;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-bottom:6px;display:none}
.warn{font-size:11px;color:var(--warn);font-family:'DM Mono',monospace;opacity:.7;text-align:center;padding:4px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc2{background:var(--bg2);border-radius:12px;padding:14px;border:1px solid var(--border)}
.sv{font-size:26px;font-weight:700;color:var(--accent)}
.sl{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px}
.streak-wrap{background:var(--bg2);border-radius:12px;padding:14px;border:1px solid var(--border)}
.streak-ttl{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:10px}
.streak-days{display:flex;gap:5px;flex-wrap:wrap}
.sd{width:30px;height:30px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);border:1px solid var(--border)}
.sd.done{background:rgba(129,199,132,.2);border-color:rgba(129,199,132,.4);color:var(--accent2)}
.sd.today{border-color:var(--accent);color:var(--accent)}
.cal-day{cursor:pointer;transition:background .15s}
.cal-day:not(.empty):hover{background:rgba(79,195,247,.08)}
.cal-day.selected{background:rgba(79,195,247,.12);border-color:var(--accent)!important}
.day-popup{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);align-items:flex-end;justify-content:center}
.day-popup.open{display:flex}
.day-popup-inner{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:500px;border-top:1px solid var(--border)}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dp-date{font-size:15px;font-weight:700}
.dp-close{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:4px 12px;cursor:pointer;font-size:13px}
.dp-badge{font-size:11px;padding:3px 10px;border-radius:8px;font-family:'DM Mono',monospace}
.dp-badge.done{background:rgba(129,199,132,.15);color:var(--accent2);border:1px solid rgba(129,199,132,.3)}
.dp-badge.plan{background:rgba(79,195,247,.1);color:var(--accent);border:1px solid rgba(79,195,247,.25)}
.dp-badge.past{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.dp-exs{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.dp-ex{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:9px;font-size:13px}
.dp-ex-n{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#0f1923;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dp-ex-done .dp-ex-n{background:var(--accent2)}
.dp-ex-name{flex:1;font-weight:500}
.dp-ex-reps{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.dp-go{width:100%;padding:12px;background:var(--accent);color:#0f1923;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-top:14px}
.dp-empty{font-size:13px;color:var(--muted);text-align:center;padding:20px 0}
/* FIT STYLES */
.fit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.fit-title{font-size:18px;font-weight:700}
.fit-subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.muscle-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:16px;padding-bottom:2px}
.muscle-tabs::-webkit-scrollbar{display:none}
.mtab{flex:none;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.mtab.on{background:var(--orange);color:#0f1923;border-color:var(--orange);font-weight:700}
.fit-ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.fex-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.fex-name{font-size:15px;font-weight:700}
.fex-muscle{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:6px;border:1px solid var(--border);color:var(--muted);margin-top:3px}
.fex-sets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.fex-set{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;background:var(--bg3);border-radius:9px;border:1px solid var(--border);min-width:60px;cursor:pointer;transition:all .2s}
.fex-set.done-set{background:rgba(129,199,132,.12);border-color:rgba(129,199,132,.3)}
.fex-set-num{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.fex-set-val{font-size:14px;font-weight:700}
.fex-set-done{font-size:10px;color:var(--accent2);display:none}
.fex-set.done-set .fex-set-done{display:block}
.fex-tips{font-size:12px;color:var(--muted);line-height:1.5;border-top:1px solid var(--border);padding-top:8px}
.fex-anim{background:#0a1520;border-radius:10px;margin-bottom:10px;display:flex;justify-content:center;padding:10px}
.fit-day-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
.fit-day-card.active-day{border-color:rgba(255,183,77,.4);background:rgba(255,183,77,.05)}
.fdc-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.fdc-num{width:28px;height:28px;border-radius:8px;background:var(--orange);color:#0f1923;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fdc-num.done-day{background:var(--accent2)}
.fdc-title{font-size:14px;font-weight:700}
.fdc-sub{font-size:11px;color:var(--muted)}
.fdc-pills{display:flex;gap:5px;flex-wrap:wrap}
.fdc-pill{font-size:11px;padding:2px 9px;border-radius:8px;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace}
.fit-log-entry{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.fle-date{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:6px}
.fle-day{font-size:14px;font-weight:700;margin-bottom:4px}
.fle-exs{font-size:12px;color:var(--muted)}
.fit-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.rest-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(255,183,77,.1);border:1px solid rgba(255,183,77,.3);border-radius:10px;font-size:12px;color:var(--orange);font-family:'DM Mono',monospace;margin-bottom:14px}
.fit-start-btn{width:100%;padding:13px;background:var(--orange);color:#0f1923;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-top:10px}
.fex-done-all{width:100%;padding:10px;background:rgba(129,199,132,.12);color:var(--accent2);border:1px solid rgba(129,199,132,.3);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-top:8px}
</style>
</head>
<body>
<div class="topbar">
  <div class="main-tabs">
    <button class="main-tab on" id="main-tab-l5" onclick="showApp('l5')">L5 Rehab</button>
    <button class="main-tab" id="main-tab-fit" onclick="showApp('fit')">Posilování</button>
  </div>
</div>

<!-- SUB-NAV L5 -->
<div class="subnav on" id="subnav-l5">
  <button class="nav-tab on" onclick="showScreen('cal')">Plán</button>
  <button class="nav-tab" onclick="showScreen('ex')">Cvičení</button>
  <button class="nav-tab" onclick="showScreen('stats')">Přehled</button>
</div>

<!-- SUB-NAV FIT -->
<div class="subnav" id="subnav-fit">
  <button class="nav-tab on" onclick="showFitScreen('fit-plan')">Plán</button>
  <button class="nav-tab" onclick="showFitScreen('fit-ex')">Cvičení</button>
  <button class="nav-tab" onclick="showFitScreen('fit-log')">Deník</button>
</div>

<div class="screen on" id="screen-cal">
  <div class="today-card">
    <div class="today-title" id="today-title">DNES</div>
    <div class="today-exs" id="today-exs"></div>
    <button class="start-btn" id="start-btn" onclick="startWorkout()">Začít trénink</button>
  </div>
  <div class="cal-header">
    <button class="cal-nav" onclick="calPrev()">&#8249;</button>
    <div class="cal-month" id="cal-month"></div>
    <button class="cal-nav" onclick="calNext()">&#8250;</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="sec-title">FÁZE REHABILITACE</div>
  <div class="phase-cards" id="phase-cards"></div>
</div>

<div class="screen" id="screen-ex">
  <div class="ex-tabs" id="ex-tabs"></div>
  <div class="anim-wrap">
    <div class="phase-pill" id="pill">—</div>
    <canvas id="cv"></canvas>
    <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
  </div>
  <div class="ex-info">
    <div class="ex-name" id="ex-name"></div>
    <div class="ex-desc" id="ex-desc"></div>
    <div class="meta-row" id="ex-meta"></div>
    <div class="voice-row">
      <div class="vdot" id="vdot"></div>
      <span class="vlabel" id="vlabel">Hlas: vypnutý</span>
      <button class="vbtn" id="vbtn" onclick="toggleVoice()">Zapnout</button>
    </div>
  </div>
  <div class="steps-row" id="steps"></div>
  <div class="ctrl-row">
    <button class="btn-play" id="btnP" onclick="togglePlay()">Přehrát</button>
    <button class="btn-reset" onclick="resetEx()">Reset</button>
  </div>
  <button class="btn-done" id="btn-done" onclick="markDone()">✓ Hotovo</button>
  <button class="btn-next" id="btn-next" onclick="goNext()">Další cvik ›</button>
  <div class="warn">Poraďte se s fyzioterapeutem před zahájením.</div>
</div>

<div class="screen" id="screen-stats">
  <div class="stat-grid" id="stat-grid"></div>
  <div class="streak-wrap">
    <div class="streak-ttl">POSLEDNÍCH 14 DNÍ</div>
    <div class="streak-days" id="streak-days"></div>
  </div>
</div>

<!-- FITNESS SCREENS -->
<div class="screen" id="fit-plan">
  <div class="fit-header">
    <div>
      <div class="fit-title">Týdenní plán</div>
      <div class="fit-subtitle">Posilování doma • Začátečník</div>
    </div>
  </div>
  <div id="fit-plan-content"></div>
</div>

<div class="screen" id="fit-ex">
  <div class="muscle-tabs" id="muscle-tabs"></div>
  <div class="anim-wrap" id="fit-anim-wrap" style="display:none">
    <div class="phase-pill" id="fit-pill">—</div>
    <canvas id="fit-cv"></canvas>
    <div class="prog-wrap"><div class="prog-bar" id="fit-prog" style="width:0%"></div></div>
  </div>
  <div id="fit-ex-content"></div>
</div>

<div class="screen" id="fit-log">
  <div class="fit-title" style="margin-bottom:14px">Deník tréninků</div>
  <div id="fit-log-content"></div>
</div>

<script>
const PHASES=[
  {label:'Fáze 1',title:'Uvolnění',desc:'Každý den. Snižuje tlak na nerv L5.',color:'#4fc3f7',ids:[0,4,1],start:0},
  {label:'Fáze 2',title:'Stabilizace',desc:'Od 5. dne. Posiluje hluboké svaly páteře.',color:'#81c784',ids:[2,5,6],start:4},
  {label:'Fáze 3',title:'Posílení',desc:'Od 12. dne. Prevence návratu obtíží.',color:'#ffb74d',ids:[7,3],start:11}
];
const PLAN={

let curEx=0,curPhase=0,playing=false,rafId=null,voiceOn=false,todayIds=[];

function speak(txt,cb){if(!voiceOn||!txt){if(cb)setTimeout(cb,100);return;}synth.cancel();const u=new SpeechSynthesisUtterance(txt);if(voiceCZ)u.voice=voiceCZ;u.lang=voiceCZ?voiceCZ.lang:'cs-CZ';u.rate=.82;u.onend=()=>{if(cb)cb();};u.onerror=()=>{if(cb)cb();};synth.speak(u);}

function resizeCanvas(){const cv=document.getElementById('cv'),w=cv.parentElement.clientWidth-24,h=Math.min(w*.65,260);cv.style.width=w+'px';cv.style.height=h+'px';cv.width=w;cv.height=h;}
function getPhaseT(ex,ph,lt){const s=ex.phaseAt[ph],e=ph+1<ex.phaseAt.length?ex.phaseAt[ph+1]:1;return s+(e-s)*lt;}
function drawAt(ph,lt){
  const ex=exs[curEx],cv=document.getElementById('cv');
  ex.draw(cv.getContext('2d'),getPhaseT(ex,ph,lt),cv.width,cv.height);
  document.getElementById('pill').textContent=ex.phases[ph];
  document.getElementById('prog').style.width=((ph+lt)/ex.phases.length*100)+'%';
  document.getElementById('steps').innerHTML=ex.steps.map((s,i)=>`<div class="sc${i===ph?' on':''}"><div class="sn">${i+1}</div><div class="stxt">${s}</div></div>`).join('');
}
function runPhase(ph){
  if(!playing)return;curPhase=ph;
  const ex=exs[curEx];drawAt(ph,0);
  speak(ex.steps[ph],()=>{
    if(!playing)return;
    const dur=ex.durations[ph]*1000;
    animPhase(ph,0,null,dur,()=>{const n=ph+1;if(n<ex.phases.length)runPhase(n);else setTimeout(()=>{if(playing){curPhase=0;runPhase(0);}},600);});
  });
}
function animPhase(ph,st,lts,dur,cb){
  if(!playing)return;const now=performance.now();if(lts===null)lts=now;
  const lt=Math.min(1,st+(now-lts)/dur);drawAt(ph,lt);
  if(lt<1)rafId=requestAnimationFrame(()=>animPhase(ph,lt,now,dur,cb));else if(cb)cb();
}
function togglePlay(){
  if(playing){playing=false;if(rafId)cancelAnimationFrame(rafId);document.getElementById('btnP').textContent='Přehrát';synth.cancel();}
  else{playing=true;document.getElementById('btnP').textContent='Pauza';runPhase(curPhase);}
}
function resetEx(){playing=false;if(rafId)cancelAnimationFrame(rafId);synth.cancel();curPhase=0;document.getElementById('btnP').textContent='Přehrát';drawAt(0,0);}

  document.getElementById('cal-month').textContent=MONTHS[calM]+' '+calY;

  for(let d=1;d<=days;d++){

  popupDateStr=ds;

  const badge=document.getElementById('dp-badge');
  if(isDone){badge.textContent='Splněno ✓';badge.className='dp-badge done';}

  else if(!plan||isPast){badge.textContent='Odpočinek';badge.className='dp-badge past';}
  else{badge.textContent='Naplánováno';badge.className='dp-badge plan';}
  const exsEl=document.getElementById('dp-exs');
  if(!plan||(!isToday&&!isPast&&!isDone&&dayN(ds)<0)){
    exsEl.innerHTML='<div class="dp-empty">Tento den je mimo plán rehabilitace.</div>';
  } else if(!plan){
    exsEl.innerHTML='<div class="dp-empty">Volný den — odpočinek.</div>';
  } else {
    exsEl.innerHTML=plan.map((id,i)=>{
      const ex=exs[id];const done=db.exDone[ds]&&db.exDone[ds][id];

  document.getElementById('day-popup').classList.add('open');
}

const LC={
  skin:'#F5C518',skinD:'#c89e00',
  body:'#E63946',bodyD:'#9B1B23',
  pants:'#1D3557',pantsD:'#0d1f33',
  shoe:'#2C2C2C',shoeD:'#111',
  arm:'#E63946',armD:'#9B1B23',
  hand:'#F5C518',handD:'#c89e00',
  floor:'#2a2a4a',floorD:'#3a3a6a'
};
function lrect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(x,y,w,h,r);
  else ctx.rect(x,y,w,h);
  ctx.closePath();ctx.fillStyle=fill;ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
}
function lhead(ctx,cx,y,s){
  s=s||1;
  lrect(ctx,cx-14*s,y,28*s,26*s,5*s,LC.skin,LC.skinD);
  lrect(ctx,cx-5*s,y-5*s,10*s,7*s,3*s,LC.skin,LC.skinD);
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(cx-6*s,y+10*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+6*s,y+10*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx,y+17*s,4*s,0.2,Math.PI-.2);ctx.strokeStyle='#111';ctx.lineWidth=1.5*s;ctx.stroke();
}
function ltorso(ctx,cx,y,w,h,s){
  s=s||1;w=w||28;h=h||30;
  lrect(ctx,cx-w/2,y,w,h,3*s,LC.body,LC.bodyD);
  lrect(ctx,cx-4*s,y-3*s,8*s,5*s,2*s,LC.body,LC.bodyD);
}
function lseg(ctx,x1,y1,x2,y2,w,fill,stroke){
  const dx=x2-x1,dy=y2-y1,a=Math.atan2(dy,dx),l=Math.sqrt(dx*dx+dy*dy);
  ctx.save();ctx.translate(x1,y1);ctx.rotate(a);
  lrect(ctx,0,-w/2,l,w,w/2*0.7,fill,stroke);
  ctx.restore();
}
function lshoe(ctx,x,y,dir){
  dir=dir||1;
  lrect(ctx,x-6+dir*2,y-4,16,8,3,LC.shoe,LC.shoeD);
}
function lfloor(ctx,y,W){
  lrect(ctx,10,y,W-20,10,4,LC.floor,LC.floorD);
}
function lball(ctx,x,y,r){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
}

    lrect(ctx,cx-90,hy-7,142,16,5,LC.body,LC.bodyD);
    lrect(ctx,cx-52,hy-60,20,60,4,LC.body,LC.bodyD);
    lhead(ctx,cx-42,hy-78,1);
    lseg(ctx,cx+14,hy,cx+36,hy-34,14,LC.pants,LC.pantsD);lball(ctx,cx+36,hy-34,7);
    lseg(ctx,cx+36,hy-34,cx+36,hy-60,12,LC.pants,LC.pantsD);
    lseg(ctx,cx-8,hy,cx-28,hy-34,14,LC.pants,LC.pantsD);lball(ctx,cx-28,hy-34,7);
    const lx=cx-28-ext*52,ly=hy-60+ext*58;
    lseg(ctx,cx-28,hy-34,lx,ly,12,LC.pants,LC.pantsD);
    lseg(ctx,cx-60,hy-20,cx-60,hy-50,12,LC.arm,LC.armD);lball(ctx,cx-60,hy-50,6);
    const rx=cx-60-ext*50,ry=hy-50+ext*50;
    lseg(ctx,cx-60,hy-50,rx,ry,10,LC.hand,LC.handD);
    lseg(ctx,cx+54,hy-20,cx+54,hy-50,12,LC.arm,LC.armD);lball(ctx,cx+54,hy-50,6);
    lseg(ctx,cx+54,hy-50,cx+54,hy-20,10,LC.hand,LC.handD);
    ctx.restore();}},
  {name:'Boční plank',muscle:'Core',sets:3,reps:'20 s každá strana',rest:'30 s',muscles:['boky','boční břicho'],
   phases:['Zaujměte polohu','Zvedněte boky','Výdrž — bok rovný','Druhá strana'],durations:[4,3,20,3],
   steps:['Lehněte na bok, opora o předloktí, nohy za sebou.','Zvedněte boky — tělo v rovné linii od hlavy k chodidlům.','Vydržte 20 sekund — bok nesmí klesat dolů.','Přejděte na druhou stranu a opakujte.'],
   draw(ctx,phase,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    const G=195;lfloor(ctx,G,320);
    const y=G-46;
    lseg(ctx,62,G,62,y+16,12,LC.arm,LC.armD);lball(ctx,62,y+16,6);
    lseg(ctx,62,y+16,96,y,12,LC.arm,LC.armD);
    lrect(ctx,96,y-7,132,16,4,LC.body,LC.bodyD);
    lball(ctx,228,y,7);
    lseg(ctx,228,y,258,y+22,14,LC.pants,LC.pantsD);lball(ctx,258,y+22,6);
    lseg(ctx,258,y+22,276,G,14,LC.pants,LC.pantsD);lshoe(ctx,276,G,1);
    lseg(ctx,228,y,252,y+24,14,LC.pants,LC.pantsD);
    lseg(ctx,252,y+24,268,G,14,LC.pants,LC.pantsD);lshoe(ctx,268,G,1);
    lseg(ctx,96,y,76,y-26,10,LC.arm,LC.armD);lball(ctx,76,y-26,5);
    lhead(ctx,68,y-18,1);
    ctx.save();ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(96,y);ctx.lineTo(228,y);
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
    ctx.restore();}
}
];

const MUSCLE_GROUPS=['Vše','Nohy','Ruce','Core'];
let activeMuscle='Vše',activeFitEx=0,fitPlaying=false,fitRafId=null,fitPhase=0;
let fitDb={log:{}};
function saveFitDb(){try{localStorage.setItem('fit2',JSON.stringify(fitDb));}catch(e){}}
function loadFitDb(){try{const d=localStorage.getItem('fit2');if(d)fitDb=JSON.parse(d);}catch(e){}}
loadFitDb();

function resizeFitCanvas(){const cv=document.getElementById('fit-cv');const wrap=document.getElementById('fit-anim-wrap');if(!wrap||wrap.style.display==='none')return;const w=wrap.clientWidth-24,h=Math.round(w*200/320);cv.style.width=w+'px';cv.style.height=h+'px';cv.width=w;cv.height=h;}
function fitGetPhaseT(ex,ph,lt){return lt;}
function fitDrawAt(ph,lt){const ex=fitExs[activeFitEx];const cv=document.getElementById('fit-cv');if(!cv)return;ex.draw(cv.getContext('2d'),ph,lt,cv.width,cv.height);const pill=document.getElementById('fit-pill');if(pill)pill.textContent=ex.phases[ph];const prog=document.getElementById('fit-prog');if(prog)prog.style.width=((ph+lt)/ex.phases.length*100)+'%';document.querySelectorAll('.fit-step-row').forEach((el,i)=>{el.style.color=i===ph?'var(--text)':'var(--muted)';el.style.background=i===ph?'rgba(79,195,247,.08)':'transparent';const num=el.querySelector('.fit-step-num');if(num){num.style.background=i===ph?'var(--accent)':'var(--bg3)';num.style.color=i===ph?'#0f1923':'var(--muted)';}});}
function fitRunPhase(ph){
  if(!fitPlaying)return;
  fitPhase=ph;
  const ex=fitExs[activeFitEx];
  fitDrawAt(ph,0);
  speak(ex.steps[ph],()=>{
    if(!fitPlaying)return;
    const dur=ex.durations[ph]*1000;
    fitAnimPhase(ph,0,null,dur,()=>{
      if(!fitPlaying)return;
      const n=ph+1;
      if(n<ex.phases.length)fitRunPhase(n);
      else setTimeout(()=>{if(fitPlaying){fitPhase=0;fitRunPhase(0);}},600);
    });
  });
}
function fitAnimPhase(ph,st,lts,dur,cb){if(!fitPlaying)return;const now=performance.now();if(lts===null)lts=now;const lt=Math.min(1,st+(now-lts)/dur);fitDrawAt(ph,lt);if(lt<1)fitRafId=requestAnimationFrame(()=>fitAnimPhase(ph,lt,now,dur,cb));else if(cb)cb();}
function fitTogglePlay(){if(fitPlaying){fitPlaying=false;if(fitRafId)cancelAnimationFrame(fitRafId);synth.cancel();const b=document.getElementById('fit-btnP');if(b)b.textContent='Přehrát';}else{fitPlaying=true;const b=document.getElementById('fit-btnP');if(b)b.textContent='Pauza';fitRunPhase(fitPhase);}}
function fitResetEx(){fitPlaying=false;if(fitRafId)cancelAnimationFrame(fitRafId);synth.cancel();fitPhase=0;const b=document.getElementById('fit-btnP');if(b)b.textContent='Přehrát';fitDrawAt(0,0);}

function selectFitEx(id){
  fitPlaying=false;if(fitRafId)cancelAnimationFrame(fitRafId);synth.cancel();
  activeFitEx=id;fitPhase=0;
  document.getElementById('fit-anim-wrap').style.display='flex';
  setTimeout(()=>{resizeFitCanvas();fitDrawAt(0,0);},30);
  renderFitExDetail(id);
  document.querySelectorAll('.fex-btn').forEach(b=>b.classList.toggle('fex-active',+b.dataset.id===id));
}

function renderFitExDetail(id){
  const ex=fitExs[id];
  const ctrl=document.getElementById('fit-ex-ctrl');if(!ctrl)return;
  ctrl.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px">
    <div style="font-size:15px;font-weight:700;margin-bottom:2px">${ex.name}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${ex.muscle} • ${ex.muscles.join(', ')}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span class="bdg">${ex.sets} série</span><span class="bdg">${ex.reps}</span><span class="bdg">odpočinek ${ex.rest}</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn-play" id="fit-btnP" onclick="fitTogglePlay()">Přehrát</button>
      <button class="btn-reset" onclick="fitResetEx()">Reset</button>
      <button class="vbtn" id="fit-vbtn" onclick="toggleVoice();document.getElementById('fit-vbtn').textContent=voiceOn?'Hlas: zap.':'Hlas: vyp.';document.getElementById('fit-vbtn').classList.toggle('on',voiceOn)" style="padding:5px 12px;font-size:12px">${voiceOn?'Hlas: zap.':'Hlas: vyp.'}</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${Array.from({length:ex.sets},(_,si)=>{const k=`fset-${id}-${si}-${todayStr()}`;const done=fitDb.log[k];return `<div class="fex-set${done?' done-set':''}" onclick="toggleFitSet('${k}',this)"><div class="fex-set-num">Série ${si+1}</div><div class="fex-set-val">${ex.reps}</div><div class="fex-set-done">✓</div></div>`;}).join('')}
    </div>
    <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:6px">
      ${ex.steps.map((s,i)=>`<div class="fit-step-row" style="display:flex;align-items:flex-start;gap:9px;padding:7px 10px;border-radius:9px;transition:all .2s">
        <div class="fit-step-num" style="min-width:20px;height:20px;border-radius:50%;background:var(--bg3);color:var(--muted);font-size:10px;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s">${i+1}</div>
        <div style="font-size:12px;line-height:1.5;color:var(--muted);transition:color .2s">${s}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function toggleFitSet(key,el){fitDb.log[key]=!fitDb.log[key];saveFitDb();el.classList.toggle('done-set',fitDb.log[key]);}

function todayFitDayIdx(){const base=new Date(db.startDate||todayStr());return Math.floor((new Date(todayStr())-base)/86400000)%7;}
function getWeekStr(){const d=new Date();return `${d.getFullYear()}-w${Math.floor((d-new Date(d.getFullYear(),0,1))/604800000)}`;}

function renderFitPlan(){
  const todayIdx=todayFitDayIdx(),el=document.getElementById('fit-plan-content');
  el.innerHTML=FIT_DAYS.map((day,i)=>{const isToday=i===todayIdx,isDone=fitDb.log[`fitday-${i}-${getWeekStr()}`];
    return `<div class="fit-day-card${isToday?' active-day':''}" onclick="openFitDay(${i})">
      <div class="fdc-header"><div class="fdc-num${isDone?' done-day':''}" style="${!isDone?'background:'+day.color:''}">${isDone?'✓':i+1}</div>
      <div><div class="fdc-title">${day.title}${isToday?' — Dnes':''}</div><div class="fdc-sub">${day.rest?'Odpočinek':day.exIds.length+' cviků'}</div></div></div>
      ${!day.rest?`<div class="fdc-pills">${day.exIds.map(id=>`<span class="fdc-pill">${fitExs[id].name}</span>`).join('')}</div>`:''}
    </div>`;}).join('');
}

function openFitDay(i){activeMuscle='Vše';showFitScreen('fit-ex');const day=FIT_DAYS[i];
  const tabs=document.getElementById('muscle-tabs');
  const mgroups=day.exIds.length?['Vše',...new Set(day.exIds.map(id=>fitExs[id].muscle))]:MUSCLE_GROUPS;
  tabs.innerHTML=mgroups.map(m=>`<button class="mtab${m==='Vše'?' on':''}" onclick="filterFitEx('${m}',${JSON.stringify(day.exIds)})">${m}</button>`).join('');
  renderFitExList(day.exIds,'Vše',i);
  if(day.exIds.length)selectFitEx(day.exIds[0]);}

function filterFitEx(muscle,ids){activeMuscle=muscle;document.querySelectorAll('.mtab').forEach(t=>t.classList.toggle('on',t.textContent===muscle));renderFitExList(ids,muscle,null);}
function renderFitEx(){const tabs=document.getElementById('muscle-tabs');tabs.innerHTML=MUSCLE_GROUPS.map(m=>`<button class="mtab${m===activeMuscle?' on':''}" onclick="filterAllFitEx('${m}')">${m}</button>`).join('');filterAllFitEx(activeMuscle);}
function filterAllFitEx(muscle){activeMuscle=muscle;document.querySelectorAll('.mtab').forEach(t=>t.classList.toggle('on',t.textContent===muscle));const ids=fitExs.map((_,i)=>i).filter(i=>muscle==='Vše'||fitExs[i].muscle===muscle);renderFitExList(ids,muscle,null);if(ids.length)selectFitEx(ids[0]);}

function renderFitExList(ids,muscle,dayIdx){
  const list=ids.length?ids:fitExs.map((_,i)=>i).filter(i=>muscle==='Vše'||fitExs[i].muscle===muscle);
  const el=document.getElementById('fit-ex-content');
  el.innerHTML=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${list.map((id)=>`<button class="fex-btn${id===activeFitEx?' fex-active':''}" data-id="${id}" onclick="selectFitEx(${id})" style="padding:7px 13px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Syne',sans-serif">${fitExs[id].name}</button>`).join('')}
  </div>
  <div id="fit-ex-ctrl"></div>
  ${dayIdx!==null?`<button class="fit-start-btn" onclick="markFitDayDone(${dayIdx})" style="margin-top:8px">✓ Den splněn</button>`:''}`;
  if(list.length)selectFitEx(list[0]);
}

function markFitDayDone(i){fitDb.log[`fitday-${i}-${getWeekStr()}`]=true;saveFitDb();renderFitPlan();showFitScreen('fit-plan');}
function renderFitLog(){
  const el=document.getElementById('fit-log-content');
  const entries=Object.entries(fitDb.log).filter(([k])=>k.startsWith('fitday-')&&fitDb.log[k]).map(([k])=>{const p=k.split('-');return{dayIdx:+p[1],week:p.slice(2).join('-')};}).sort((a,b)=>b.week.localeCompare(a.week));
  if(!entries.length){el.innerHTML='<div class="fit-empty">Zatím žádné splněné tréninky.<br>Začni cvičit!</div>';return;}
  el.innerHTML=entries.map(e=>{const day=FIT_DAYS[e.dayIdx];return `<div class="fit-log-entry"><div class="fle-date">${e.week}</div><div class="fle-day">${day.title}</div><div class="fle-exs">${day.rest?'Odpočinek':day.exIds.map(id=>fitExs[id].name).join(', ')}</div></div>`;}).join('');
}
window.addEventListener('resize',()=>{resizeCanvas();drawAt(curPhase,0);resizeFitCanvas();});
</script>
<div class="day-popup" id="day-popup" onclick="closeDayPopup(event)">
  <div class="day-popup-inner">
    <div class="dp-header">
      <div class="dp-date" id="dp-date"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="dp-badge" id="dp-badge"></span>
        <button class="dp-close" onclick="closeDayPopup()">✕</button>
      </div>
    </div>
    <div class="dp-exs" id="dp-exs"></div>
    <button class="dp-go" id="dp-go" style="display:none" onclick="startFromPopup()">Začít trénink</button>
  </div>
</div>
