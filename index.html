<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="L5 Rehab">
<link rel="manifest" href="manifest.json">
<title>L5 Rehabilitace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1923;
  --bg2: #162030;
  --bg3: #1d2d40;
  --accent: #4fc3f7;
  --accent2: #81c784;
  --warn: #ffb74d;
  --text: #e8f4fd;
  --muted: #7a9ab5;
  --border: rgba(79,195,247,0.15);
  --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0}
.app-title{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-family:'DM Mono',monospace}
.voice-toggle{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .2s;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.voice-toggle.on{border-color:var(--accent2);color:var(--accent2);background:rgba(129,199,132,.08)}
.voice-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);opacity:0;transition:.2s}
.voice-toggle.on .voice-dot{opacity:1;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* TABS SCROLL */
.tabs-wrap{padding:0 14px 10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:8px;width:max-content}
.tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Syne',sans-serif}
.tab.on{background:var(--accent);color:#0f1923;border-color:var(--accent);font-weight:700}

/* STAGE */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:0 16px;min-height:0}
.phase-tag{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--accent);border:1px solid var(--border);padding:5px 14px;border-radius:20px;margin-bottom:14px;text-align:center;text-transform:uppercase;background:rgba(79,195,247,.05)}
canvas{border-radius:var(--r);max-width:100%;max-height:45vh;width:100%}

/* PROGRESS */
.prog-wrap{width:100%;height:3px;background:var(--bg3);border-radius:2px;margin-top:14px;overflow:hidden}
.prog-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .05s linear}

/* BOTTOM PANEL */
.panel{background:var(--bg2);border-top:1px solid var(--border);padding:14px 18px;flex-shrink:0}
.ex-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.ex-name{font-size:16px;font-weight:700}
.badges{display:flex;gap:6px}
.bdg{font-size:10px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:8px;border:1px solid var(--border);color:var(--muted)}
.steps-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.steps-row::-webkit-scrollbar{display:none}
.step-chip{flex:none;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);font-size:12px;color:var(--muted);transition:all .25s;max-width:200px}
.step-chip.on{border-color:var(--accent);background:rgba(79,195,247,.08);color:var(--text)}
.step-chip .sn{min-width:18px;height:18px;border-radius:50%;background:var(--bg);font-size:10px;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;color:var(--muted);border:1px solid var(--border);flex-shrink:0}
.step-chip.on .sn{background:var(--accent);color:#0f1923;border-color:var(--accent)}
.step-txt-chip{font-size:12px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step-chip.on .step-txt-chip{white-space:normal}
.ctrls{display:flex;gap:10px}
.btn-play{flex:1;padding:12px;background:var(--accent);color:#0f1923;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .15s}
.btn-play:active{opacity:.8}
.btn-reset{padding:12px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;font-size:14px;color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif}
.warn-bar{margin-top:10px;font-size:11px;color:var(--warn);font-family:'DM Mono',monospace;opacity:.7;text-align:center}

/* TV / LANDSCAPE */
@media (min-width:700px) and (orientation:landscape){
  .app{flex-direction:row;flex-wrap:wrap}
  .top-bar{width:100%;padding:12px 24px 8px}
  .tabs-wrap{width:100%;padding:0 20px 8px}
  .stage{flex:1;padding:16px 20px}
  canvas{max-height:70vh}
  .panel{width:300px;border-top:none;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;padding:20px}
  .step-chip{max-width:none}
  .step-txt-chip{white-space:normal}
}

/* Cast receiver fullscreen */
@media (min-width:1200px){
  canvas{max-height:75vh}
  .ex-name{font-size:20px}
}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="app-title">L5 Rehab</div>
    <button class="voice-toggle" id="btnV">
      <div class="voice-dot"></div>
      <span id="vLabel">Hlas: vyp.</span>
    </button>
  </div>
  <div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
  <div class="stage">
    <div class="phase-tag" id="pill">—</div>
    <canvas id="cv"></canvas>
    <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
  </div>
  <div class="panel">
    <div class="ex-header">
      <div class="ex-name" id="exn"></div>
      <div class="badges" id="meta"></div>
    </div>
    <div class="steps-row" id="steps"></div>
    <div class="ctrls">
      <button class="btn-play" id="btnP">Přehrát</button>
      <button class="btn-reset" id="btnR">Reset</button>
    </div>
    <div class="warn-bar">Poraďte se s fyzioterapeutem před zahájením.</div>
  </div>
</div>

<script>
const C={body:'#4fc3f7',joint:'#0288d1',skin:'#ffcc80',ground:'#1d3a55',gf:'#162d42',spine:'#29b6f6',dim:'#1e5f85',arrow:'#81c784',accent:'#4fc3f7'};
function ease(x){return x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2}
function gnd(ctx,y,x0,x1){ctx.fillStyle=C.gf;ctx.fillRect(x0,y,x1-x0,8);ctx.fillStyle=C.ground;ctx.fillRect(x0,y,x1-x0,2);}
function limb(ctx,x1,y1,x2,y2,r,col){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=col;ctx.lineWidth=r*2;ctx.lineCap='round';ctx.stroke();}
function jnt(ctx,x,y,r,col){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=col||C.joint;ctx.fill();}
function hd(ctx,x,y){ctx.beginPath();ctx.arc(x,y,13,0,Math.PI*2);ctx.fillStyle=C.skin;ctx.fill();ctx.strokeStyle=C.body;ctx.lineWidth=2.5;ctx.stroke();}
function lbl(ctx,x,y,txt,col){ctx.fillStyle=col||C.accent;ctx.font='500 11px DM Mono,monospace';ctx.textAlign='center';ctx.fillText(txt,x,y);}
function arr(ctx,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,l=Math.sqrt(dx*dx+dy*dy),ux=dx/l,uy=dy/l;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=C.arrow;ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-ux*8+uy*4,y2-uy*8-ux*4);ctx.lineTo(x2-ux*8-uy*4,y2-uy*8+ux*4);ctx.closePath();ctx.fillStyle=C.arrow;ctx.fill();}
function spn(ctx,x1,y1,x2,y2){limb(ctx,x1,y1,x2,y2,8,C.spine);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=C.body;ctx.lineWidth=3;ctx.lineCap='round';ctx.setLineDash([6,5]);ctx.stroke();ctx.setLineDash([]);}

const exs=[
  {name:'Kolenní přitažení',desc:'Uvolnění tlaku na L5',reps:'10×',hold:'5 s',freq:'2× denně',
   phases:['Výchozí poloha','Přitahování kolena','Výdrž — protažení','Pomalý návrat'],phaseAt:[0,.2,.5,.8],
   steps:['Lehněte na záda na rovnou podložku.','Pomalu přitahujte koleno k hrudníku oběma rukama.','Vydržte 5 sekund — cítíte protažení v zádech.','Pomalu vraťte nohu a opakujte druhou stranou.'],
   draw(ctx,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    gnd(ctx,158,20,300);let a=0;if(t<.2)a=0;else if(t<.5)a=ease((t-.2)/.3)*108;else if(t<.8)a=108;else a=ease(1-(t-.8)/.2)*108;
    const ar=a*Math.PI/180,hx=210,hy=148;
    limb(ctx,hx-120,hy,hx+20,hy,11,C.body);limb(ctx,hx-80,hy,hx-80,hy-60,18,C.body);hd(ctx,hx-80,hy-76);
    const kx=hx-Math.sin(ar)*68,ky=hy-Math.cos(ar)*38-Math.sin(ar)*22;
    limb(ctx,hx,hy,kx,ky,10,C.body);jnt(ctx,kx,ky,8,C.joint);
    const sa=ar*.55,fx=kx-Math.sin(sa)*52,fy=ky-Math.cos(sa)*22+Math.sin(sa)*18;
    limb(ctx,kx,ky,fx,fy,8,C.dim);limb(ctx,hx+20,hy,hx+65,hy,10,C.body);limb(ctx,hx+65,hy,hx+82,hy+6,8,C.dim);
    if(a>15){limb(ctx,hx-95,hy-12,kx-8,ky+4,7,C.skin);limb(ctx,hx-80,hy-8,kx+2,ky+6,7,C.skin);}
    jnt(ctx,hx,hy,10,C.joint);if(a>5)arr(ctx,hx+5,hy-18,kx+4,ky-10);
    lbl(ctx,160,200,`úhel: ${Math.round(a)}°`);ctx.restore();
   }},
  {name:'Kočka – kráva',desc:'Mobilizace bederní páteře',reps:'12×',hold:'3 s',freq:'3× denně',
   phases:['Neutrální záda','Kočka — záda nahoru','Přechod','Kráva — záda dolů'],phaseAt:[0,.15,.5,.7],
   steps:['Klekněte na ruce a kolena, záda rovná.','Vydechněte a zakulaťte záda co nejvýše.','Pomalu přejděte přes neutrální polohu.','Nadechněte a prohněte záda dolů — kráva.'],
   draw(ctx,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    let curve=0;if(t<.15)curve=0;else if(t<.45)curve=ease((t-.15)/.3)*32;else if(t<.5)curve=32*(1-(t-.45)/.05);else if(t<.7)curve=-ease((t-.5)/.2)*24;else curve=-24*(1-(t-.7)/.3);
    const pts=[];for(let i=0;i<=10;i++)pts.push({x:70+i*18,y:110-Math.sin(i/10*Math.PI)*curve});
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let p of pts)ctx.lineTo(p.x,p.y);ctx.strokeStyle=C.body;ctx.lineWidth=16;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let p of pts)ctx.lineTo(p.x,p.y);ctx.strokeStyle=C.spine;ctx.lineWidth=3;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    [pts[2],pts[8]].forEach(p=>{limb(ctx,p.x,p.y,p.x-8,p.y+48,9,C.body);limb(ctx,p.x-8,p.y+48,p.x-8,p.y+76,8,C.dim);jnt(ctx,p.x-8,p.y+48,6,C.joint);limb(ctx,p.x,p.y,p.x,p.y+48,9,C.body);limb(ctx,p.x,p.y+48,p.x+8,p.y+76,8,C.dim);jnt(ctx,p.x,p.y+48,6,C.joint);});
    hd(ctx,pts[0].x-14,pts[0].y);
    const mid=pts[5];if(Math.abs(curve)>3){arr(ctx,mid.x,mid.y+4,mid.x,mid.y+(curve>0?-30:30));lbl(ctx,160,200,curve>0?'záda nahoru — kočka':'záda dolů — kráva',curve>0?C.accent:'#ffb74d');}
    ctx.restore();
   }},
  {name:'Mrtvý brouk',desc:'Hluboká stabilizace páteře',reps:'10× střídavě',hold:'3 s',freq:'2× denně',
   phases:['Výchozí poloha','Spouštění paže a nohy','Výdrž — záda přitlačená','Návrat'],phaseAt:[0,.2,.55,.78],
   steps:['Lehněte na záda, ruce ke stropu, kolena 90°.','Pomalu spusťte pravou paži a levou nohu.','Udržujte záda přitlačená k podložce — výdrž 3 s.','Vraťte a opakujte druhou stranou.'],
   draw(ctx,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    gnd(ctx,152,20,300);let ext=0;if(t<.2)ext=0;else if(t<.5)ext=ease((t-.2)/.3);else if(t<.55)ext=1;else ext=ease(1-(t-.55)/.45);
    const cx=165,hy=140;
    limb(ctx,cx-90,hy,cx+55,hy,13,C.body);limb(ctx,cx-50,hy,cx-50,hy-65,18,C.body);hd(ctx,cx-50,hy-80);
    limb(ctx,cx+10,hy,cx+35,hy-35,12,C.body);jnt(ctx,cx+35,hy-35,8,C.joint);limb(ctx,cx+35,hy-35,cx+35,hy-65,10,C.dim);
    limb(ctx,cx-10,hy,cx-30,hy-35,12,C.body);jnt(ctx,cx-30,hy-35,8,C.joint);limb(ctx,cx-30,hy-35,cx-30-ext*55,hy-65+ext*60,10,C.body);
    const rax=cx-60,ray=hy-30;limb(ctx,cx-60,hy-20,rax,ray,10,C.body);jnt(ctx,rax,ray,7,C.joint);limb(ctx,rax,ray,rax-ext*55,ray+ext*55,9,C.body);
    if(ext>.05){const ex1=rax-ext*55,ey1=ray+ext*55,ex2=cx-30-ext*55,ey2=hy-65+ext*60;ctx.beginPath();ctx.moveTo(ex1,ey1);ctx.lineTo(ex2,ey2);ctx.strokeStyle='rgba(129,199,132,.35)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);}
    limb(ctx,cx+55,hy-20,cx+70,hy-20,10,C.body);jnt(ctx,cx+70,hy-20,7,C.joint);limb(ctx,cx+70,hy-20,cx+70,hy-55,9,C.dim);
    lbl(ctx,160,200,ext>.1?'záda přitlačená — stabilizace':'výchozí poloha',ext>.1?C.arrow:C.accent);ctx.restore();
   }},
  {name:'Výpad s rotací',desc:'Posílení hýžďových svalů',reps:'8× každá strana',hold:'2 s',freq:'1× denně',
   phases:['Výchozí stoj','Výpad vpřed','Rotace trupu','Návrat'],phaseAt:[0,.22,.5,.78],
   steps:['Stůjte rovně, nohy na šíři boků.','Udělejte krok vpřed do výpadu.','Otočte trup k přední noze — výdrž 2 s.','Vraťte se do stoje a střídejte strany.'],
   draw(ctx,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    gnd(ctx,185,20,300);let step=0,rot=0;if(t<.22){step=0;}else if(t<.45){step=ease((t-.22)/.23);}else if(t<.52){step=1;rot=ease((t-.45)/.07);}else if(t<.78){step=1;rot=1-ease((t-.52)/.26);}else{step=ease(1-(t-.78)/.22);}
    const hx=148,hy=175-step*52,fkx=hx+step*72,fky=175-step*18,bkx=hx-step*38,bky=175-step*8;
    limb(ctx,hx,hy,bkx,bky,12,C.body);limb(ctx,bkx,bky,hx-step*20,175,10,C.dim);jnt(ctx,bkx,bky,8,C.joint);
    limb(ctx,hx,hy,fkx,fky,12,C.body);limb(ctx,fkx,fky,hx+step*90,175,10,C.body);jnt(ctx,fkx,fky,8,C.joint);jnt(ctx,hx,hy,11,C.joint);
    const ra=rot*22*Math.PI/180,tx=hx+Math.sin(ra)*55,ty=hy-Math.cos(ra)*55;
    spn(ctx,hx,hy,tx,ty);hd(ctx,tx,ty-16);
    limb(ctx,tx,ty,tx-Math.cos(ra)*22,ty+Math.sin(ra)*22+18,9,C.body);
    if(rot>.15){ctx.beginPath();ctx.arc(hx,hy,34,-Math.PI/2,-Math.PI/2+ra,false);ctx.strokeStyle=C.arrow;ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);lbl(ctx,hx+52,hy-28,`${Math.round(rot*22)}°`,C.arrow);}
    lbl(ctx,160,200,step<.1?'výchozí stoj':rot>.2?'rotace trupu':'výpad vpřed');ctx.restore();
   }},
  {name:'Protažení hruška',desc:'Uvolnění piriformis a sedacího nervu',reps:'3× každá strana',hold:'30 s',freq:'2× denně',
   phases:['Výchozí poloha','Překřížení nohy','Přitažení ke hrudníku','Výdrž — protažení'],phaseAt:[0,.2,.45,.65],
   steps:['Lehněte na záda, obě kolena ohnutá.','Pravý kotník položte na levé koleno.','Oběma rukama přitahujte levé stehno k hrudníku.','Vydržte 30 sekund — cítíte protažení v hýždi.'],
   draw(ctx,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    gnd(ctx,158,20,300);let cross=0,pull=0;if(t<.2)cross=0;else if(t<.4)cross=ease((t-.2)/.2);else cross=1;if(t<.45)pull=0;else if(t<.65)pull=ease((t-.45)/.2);else if(t<.8)pull=1;else pull=ease(1-(t-.8)/.2);
    const hx=210,hy=148;
    limb(ctx,hx-120,hy,hx+20,hy,11,C.body);limb(ctx,hx-80,hy,hx-80,hy-60,18,C.body);hd(ctx,hx-80,hy-76);
    const lky=hy-35*pull,lkx=hx-10;
    limb(ctx,hx-20,hy,lkx,lky,10,C.body);jnt(ctx,lkx,lky,8,C.joint);limb(ctx,lkx,lky,lkx+10,lky+40*(1-pull*.6),8,C.dim);
    const rkx=hx+30-pull*10,rky=hy-15-pull*20;
    limb(ctx,hx+10,hy,rkx,rky,10,C.body);jnt(ctx,rkx,rky,8,C.joint);
    const akx=rkx-40+cross*(-14);
    if(cross>.1){limb(ctx,rkx,rky,akx,lky+5,8,C.body);jnt(ctx,akx,lky+5,6,C.arrow);}else{limb(ctx,rkx,rky,rkx+15,rky+38,8,C.dim);}
    if(pull>.1){limb(ctx,hx-100,hy-15,lkx-5,lky+5,7,C.skin);limb(ctx,hx-90,hy-10,rkx-5,rky+5,7,C.skin);}
    jnt(ctx,hx-20,hy,10,C.joint);
    lbl(ctx,160,200,pull>.3?'protažení hruška — výdrž':cross>.3?'překřížení nohy':'výchozí poloha',pull>.3?C.arrow:C.accent);ctx.restore();
   }},
  {name:'Ptačí pes',desc:'Stabilizace páteře L5 ve čtyřech',reps:'10× střídavě',hold:'5 s',freq:'2× denně',
   phases:['Výchozí poloha','Natahování paže a nohy','Výdrž — rovnováha','Návrat'],phaseAt:[0,.2,.5,.8],
   steps:['Klekněte na ruce a kolena, záda rovná.','Natáhněte pravou paži a levou nohu do roviny zad.','Vydržte 5 sekund — záda rovná, nezakláníte se.','Vraťte a opakujte druhou stranou.'],
   draw(ctx,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    let ext=0;if(t<.2)ext=0;else if(t<.5)ext=ease((t-.2)/.3);else if(t<.8)ext=1;else ext=ease(1-(t-.8)/.2);
    const pts=[];for(let i=0;i<=8;i++)pts.push({x:70+i*22,y:105});
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let p of pts)ctx.lineTo(p.x,p.y);ctx.strokeStyle=C.body;ctx.lineWidth=16;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let p of pts)ctx.lineTo(p.x,p.y);ctx.strokeStyle=C.spine;ctx.lineWidth=3;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    [pts[2],pts[6]].forEach(p=>{limb(ctx,p.x,p.y,p.x-6,p.y+48,9,C.body);limb(ctx,p.x-6,p.y+48,p.x-6,p.y+76,8,C.dim);jnt(ctx,p.x-6,p.y+48,6,C.joint);limb(ctx,p.x,p.y,p.x+6,p.y+48,9,C.body);limb(ctx,p.x+6,p.y+48,p.x+6,p.y+76,8,C.dim);jnt(ctx,p.x+6,p.y+48,6,C.joint);});
    hd(ctx,pts[0].x-14,pts[0].y);
    const tp=pts[pts.length-1];
    const lex=tp.x+ext*55,ley=tp.y+ext*2;limb(ctx,tp.x,tp.y,lex,ley,10,C.body);jnt(ctx,lex,ley,7,ext>.5?C.arrow:C.joint);
    const aex=pts[0].x-14-ext*55,aey=pts[0].y+ext*2;limb(ctx,pts[0].x-14,pts[0].y,aex,aey,10,C.body);jnt(ctx,aex,aey,7,ext>.5?C.arrow:C.joint);
    if(ext>.3){ctx.beginPath();ctx.moveTo(aex,aey);ctx.lineTo(lex,ley);ctx.strokeStyle='rgba(129,199,132,.3)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);lbl(ctx,160,200,'záda rovná — rovnováha',C.arrow);}
    else lbl(ctx,160,200,'výchozí poloha');ctx.restore();
   }},
  {name:'Most — pánev',desc:'Posílení hýžďových svalů a core',reps:'15×',hold:'3 s',freq:'2× denně',
   phases:['Výchozí poloha','Zvedání pánve','Výdrž — rovná linie','Pomalé spouštění'],phaseAt:[0,.2,.55,.75],
   steps:['Lehněte na záda, kolena ohnutá, chodidla na zemi.','Pomalu zvedejte pánev — stáhněte hýždi.','Vydržte 3 s — tělo v rovné linii od ramen ke kolenům.','Pomalu spusťte pánev zpět na zem.'],
   draw(ctx,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    gnd(ctx,158,20,300);let lift=0;if(t<.2)lift=0;else if(t<.55)lift=ease((t-.2)/.35);else if(t<.75)lift=1;else lift=ease(1-(t-.75)/.25);
    const hy=150,rise=lift*52,shX=80,shY=hy,hipX=165,hipY=hy-rise,knX=220,knY=hy-rise*.15;
    limb(ctx,shX,shY,shX+20,shY,10,C.body);
    spn(ctx,shX+10,shY,hipX,hipY);
    limb(ctx,hipX,hipY,knX,knY,12,C.body);jnt(ctx,knX,knY,8,C.joint);limb(ctx,knX,knY,240,hy,10,C.body);
    jnt(ctx,hipX,hipY,10,lift>.1?C.arrow:C.joint);hd(ctx,shX-4,shY-18);
    limb(ctx,shX,shY-5,shX+35,shY+8,8,C.body);
    if(lift>.05)arr(ctx,hipX,hipY+10,hipX,hipY-20);
    lbl(ctx,160,200,lift>.7?'výdrž — rovná linie':lift>.05?`zdvih: ${Math.round(lift*52)} mm`:'výchozí poloha',lift>.7?C.arrow:C.accent);ctx.restore();
   }},
  {name:'Úklon v sedě',desc:'Protažení bočních svalů páteře',reps:'5× každá strana',hold:'20 s',freq:'2× denně',
   phases:['Vzpřímený sed','Úklon vpravo','Výdrž — protažení','Návrat a druhá strana'],phaseAt:[0,.2,.45,.75],
   steps:['Sedněte rovně na kraj židle, nohy na zemi.','Pomalu se ukloňte vpravo, levá ruka míří ke stropu.','Vydržte 20 sekund — cítíte protažení vlevo v zádech.','Vraťte se a opakujte na druhou stranu.'],
   draw(ctx,t,W,H){
    ctx.clearRect(0,0,W,H);const s=W/320;ctx.save();ctx.scale(s,s);
    gnd(ctx,175,80,240);let lean=0;if(t<.2)lean=0;else if(t<.45)lean=ease((t-.2)/.25)*28;else if(t<.75)lean=28;else lean=ease(1-(t-.75)/.25)*28;
    const sx=160,sy=165,lr=lean*Math.PI/180,hipY=sy-10;
    limb(ctx,sx-30,hipY,sx+30,hipY,10,C.body);
    limb(ctx,sx-30,hipY,sx-30,sy+12,10,C.body);limb(ctx,sx-30,sy+12,sx-30,sy+35,9,C.dim);
    limb(ctx,sx+30,hipY,sx+30,sy+12,10,C.body);limb(ctx,sx+30,sy+12,sx+30,sy+35,9,C.dim);
    jnt(ctx,sx-30,sy+12,7,C.joint);jnt(ctx,sx+30,sy+12,7,C.joint);
    const tx=sx+Math.sin(lr)*55,ty=hipY-Math.cos(lr)*55;
    spn(ctx,sx,hipY,tx,ty);hd(ctx,tx,ty-16);
    const lax=tx-Math.sin(lr+.5)*50,lay=ty-Math.cos(lr+.5)*42;
    limb(ctx,tx,ty,tx-Math.cos(lr)*22,ty+Math.sin(lr)*22+18,9,C.dim);
    limb(ctx,tx,ty,lax,lay,9,C.body);jnt(ctx,lax,lay,6,C.arrow);
    if(lean>5){arr(ctx,sx-50,hipY-20,sx-50,hipY-55);lbl(ctx,160,200,`úklon: ${Math.round(lean)}°`,lean>20?C.arrow:C.accent);}
    else lbl(ctx,160,200,'vzpřímený sed');ctx.restore();
   }}
];

let cur=0,animT=0,playing=false,rafId=null,lastTs=null,voiceOn=false,lastSi=-1;
const DUR=5500;
const synth=window.speechSynthesis;
let voiceCZ=null;
function loadV(){const vv=synth.getVoices();voiceCZ=vv.find(v=>v.lang.startsWith('cs'))||vv.find(v=>v.lang.startsWith('sk'))||null;}
loadV();if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadV;

function speak(txt){
  if(!voiceOn||!txt)return;synth.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  if(voiceCZ)u.voice=voiceCZ;u.lang=voiceCZ?voiceCZ.lang:'cs-CZ';u.rate=.88;synth.speak(u);
}

function resizeCanvas(){
  const cv=document.getElementById('cv');
  const stage=cv.parentElement;
  const w=stage.clientWidth-32;
  const h=Math.min(w*.65,stage.clientHeight-80);
  cv.style.width=w+'px';cv.style.height=h+'px';
  cv.width=w;cv.height=h;
}

function getPhaseIdx(ex,t){let si=0;for(let i=0;i<ex.phaseAt.length;i++)if(t>=ex.phaseAt[i])si=i;return si;}

function drawFrame(){
  const ex=exs[cur];const cv=document.getElementById('cv');
  ex.draw(cv.getContext('2d'),animT,cv.width,cv.height);
  const si=getPhaseIdx(ex,animT);
  document.getElementById('pill').textContent=ex.phases[si];
  document.getElementById('prog').style.width=(animT*100)+'%';
  document.getElementById('steps').innerHTML=ex.steps.map((s,i)=>
    `<div class="step-chip${i===si?' on':''}"><div class="sn">${i+1}</div><div class="step-txt-chip">${s}</div></div>`
  ).join('');
  if(si!==lastSi){lastSi=si;speak(ex.steps[si]);}
}

function renderUI(){
  const ex=exs[cur];
  document.getElementById('exn').textContent=ex.name;
  document.getElementById('meta').innerHTML=`<span class="bdg">${ex.reps}</span><span class="bdg">${ex.hold}</span>`;
  const tabsEl=document.getElementById('tabs');
  tabsEl.innerHTML=exs.map((e,i)=>`<button class="tab${i===cur?' on':''}" data-i="${i}">${e.name}</button>`).join('');
  tabsEl.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    cur=+b.dataset.i;stopAnim();animT=0;lastSi=-1;renderUI();drawFrame();
    tabsEl.querySelectorAll('.tab')[cur].scrollIntoView({behavior:'smooth',inline:'center'});
  }));
  drawFrame();
}

function tick(ts){
  if(!lastTs)lastTs=ts;animT=Math.min(1,animT+(ts-lastTs)/DUR);lastTs=ts;drawFrame();
  if(animT<1)rafId=requestAnimationFrame(tick);
  else setTimeout(()=>{animT=0;lastSi=-1;if(playing)startAnim();else drawFrame();},700);
}
function startAnim(){playing=true;lastTs=null;rafId=requestAnimationFrame(tick);document.getElementById('btnP').textContent='Pauza';}
function stopAnim(){playing=false;if(rafId)cancelAnimationFrame(rafId);document.getElementById('btnP').textContent='Přehrát';synth.cancel();}

document.getElementById('btnP').addEventListener('click',()=>playing?stopAnim():startAnim());
document.getElementById('btnR').addEventListener('click',()=>{stopAnim();animT=0;lastSi=-1;drawFrame();});
document.getElementById('btnV').addEventListener('click',()=>{
  voiceOn=!voiceOn;
  document.getElementById('btnV').classList.toggle('on',voiceOn);
  document.getElementById('vLabel').textContent=voiceOn?'Hlas: zap.':'Hlas: vyp.';
  if(voiceOn)speak(exs[cur].steps[getPhaseIdx(exs[cur],animT)]);else synth.cancel();
});

window.addEventListener('resize',()=>{resizeCanvas();drawFrame();});
resizeCanvas();renderUI();
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js");</script>
